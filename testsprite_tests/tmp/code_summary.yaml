version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 18
  - Vite
  - Tailwind CSS
  - react-router-dom
  - Solana wallet adapters
routes:
  - path: /landing
    file: forntend/src/pages/Landing.tsx
    auth_required: false
    description: Public landing page
  - path: /login
    file: forntend/src/pages/Login.tsx
    auth_required: false
    description: User login page
  - path: /signup
    file: forntend/src/pages/Signup.tsx
    auth_required: false
    description: User signup page
  - path: /startups
    file: forntend/src/pages/Startups.tsx
    auth_required: false
    description: List of recent startups
  - path: /startup/:id
    file: forntend/src/pages/StartupDetail.tsx
    auth_required: false
    description: Single startup detail and invest
  - path: /build
    file: forntend/src/pages/Build.tsx
    auth_required: true
    description: Create new startup form
  - path: /portfolio
    file: forntend/src/pages/Portfolio.tsx
    auth_required: true
    description: User investment portfolio
  - path: /chat/:id
    file: forntend/src/pages/ProjectDev.tsx
    auth_required: true
    description: Embedded project dev iframe
features:
  - name: User Login
    description: Login with email and password
    files:
      - forntend/src/pages/Login.tsx
      - forntend/src/context/AuthContext.tsx
    entry_route: /login
    user_interactions:
      - Fill email input
      - Fill password input
      - Click Login button
      - See error on invalid credentials
    api_calls:
      - method: POST
        endpoint: /auth/login
    auth_required: false
  - name: User Signup
    description: Register with name, email, password, wallet address
    files:
      - forntend/src/pages/Signup.tsx
    entry_route: /signup
    user_interactions:
      - Fill name, email, password, wallet address
      - Click Sign up button
      - See error on duplicate email or invalid input
    api_calls:
      - method: POST
        endpoint: /auth/signup
    auth_required: false
  - name: Recent Startups List
    description: View all startups with funding progress
    files:
      - forntend/src/pages/Startups.tsx
    entry_route: /startups
    user_interactions:
      - See skeleton while loading
      - See grid of startup cards with name, description, valuation, countdown, progress bar
      - Click a card to open startup detail
    api_calls:
      - method: GET
        endpoint: /startups
    auth_required: false
  - name: Startup Detail
    description: View startup details, GitHub/LinkedIn/X links, categories, and invest with SOL
    files:
      - forntend/src/pages/StartupDetail.tsx
    entry_route: /startup/:id
    user_interactions:
      - See title, description, founder, valuation, countdown, progress bar, category tags
      - If funding open and logged in, enter SOL amount and click Invest
      - Connect wallet if not connected
      - See investors list
    api_calls:
      - method: GET
        endpoint: /startups/:id
      - method: POST
        endpoint: /invest
    auth_required: false
  - name: Create Startup
    description: Submit new startup with name, description, categories, founder links
    files:
      - forntend/src/pages/Build.tsx
    entry_route: /build
    user_interactions:
      - Fill startup name, description
      - Select up to 4 category tags
      - Optionally fill LinkedIn, X, Github URLs
      - Click Create startup
    api_calls:
      - method: POST
        endpoint: /startups
    auth_required: true
  - name: Portfolio
    description: View user investments
    files:
      - forntend/src/pages/Portfolio.tsx
    entry_route: /portfolio
    user_interactions:
      - See list of investments with startup, amount, stake
    api_calls:
      - method: GET
        endpoint: /portfolio
    auth_required: true
  - name: Landing Page
    description: Public marketing landing page
    files:
      - forntend/src/pages/Landing.tsx
    entry_route: /landing
    user_interactions:
      - Scroll sections, click Sign In or Launch AI Startup
    api_calls: []
    auth_required: false
known_limitations: []
